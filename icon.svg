<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 打开的书本 -->
  <g transform="translate(256,280)">
    <!-- 左页 -->
    <rect x="-120" y="-90" width="120" height="150" rx="8" fill="#FFF8E1" stroke="#8D6E63" stroke-width="3"/>
    <!-- 右页 -->
    <rect x="0" y="-90" width="120" height="150" rx="8" fill="#FFFDE7" stroke="#8D6E63" stroke-width="3"/>
    <!-- 书脊 -->
    <line x1="0" y1="-90" x2="0" y2="60" stroke="#8D6E63" stroke-width="2"/>
    <!-- 左页文字线 -->
    <line x1="-105" y1="-55" x2="-15" y2="-55" stroke="#CE93D8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-105" y1="-30" x2="-30" y2="-30" stroke="#E1BEE7" stroke-width="3" stroke-linecap="round"/>
    <line x1="-105" y1="-5" x2="-20" y2="-5" stroke="#E1BEE7" stroke-width="3" stroke-linecap="round"/>
    <!-- 右页文字线 -->
    <line x1="15" y1="-55" x2="105" y2="-55" stroke="#CE93D8" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="-30" x2="90" y2="-30" stroke="#E1BEE7" stroke-width="3" stroke-linecap="round"/>
    <!-- 花朵装饰 -->
    <circle cx="0" cy="-110" r="20" fill="#FFB300"/>
    <g transform="translate(0,-110)">
      <circle cx="0" cy="-14" r="10" fill="#FFE082"/>
      <circle cx="10" cy="-6" r="8" fill="#FFE082"/>
      <circle cx="-10" cy="-6" r="8" fill="#FFE082"/>
      <circle cx="8" cy="8" r="8" fill="#FFE082"/>
      <circle cx="-8" cy="8" r="8" fill="#FFE082"/>
      <circle cx="0" cy="0" r="6" fill="#FFB300"/>
    </g>
  </g>
  <!-- 标题 -->
  <text x="256" y="420" text-anchor="middle" font-size="48" font-weight="900" fill="#fff" font-family="sans-serif">花音故事</text>
</svg>
